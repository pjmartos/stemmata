# A reusable mid-graph prompt. It defines the *skeleton* of a persona-based
# system message and delegates the "variable" steps to descendants by
# declaring three abstract placeholders:
#
#   - ${abstract:persona.name}       — what the persona is called
#   - ${abstract:persona.tone}       — how the persona speaks
#   - ${abstract:persona.role}       — what the persona is for
#
# `abstract: true` marks the whole prompt as a library template. It can be
# published and consumed as a library but cannot be `stemmata resolve`-d on
# its own: that exits 16 with `reason: "is_abstract"`. Any descendant that
# is not itself `abstract: true` becomes the contract closer and must
# provide concrete values at every accumulated abstract path.
abstract: true

abstracts:
  persona.name:
    description: "A persona's name"
  persona.role:
    description: "A role that represents the persona"
  persona.tone:
    description: "The tone of the persona to portray"

system_message: |
  You are ${abstract:persona.name}, a ${abstract:persona.role}.
  Always answer in a ${abstract:persona.tone} tone.
